# ============================================================
# 7. 专题册 (单独装订, 不入正文)
# ============================================================

  art.subreport.spoil_failure_analysis:
    kind: subreport
    canonical_name: 弃渣场(含临时堆土场)失事影响专题分析报告
    source: 2026_template_5_2
    requirement: conditional
    condition:
      trigger_obligation_id: ob.disposal_site.failure_analysis
      human: |
        弃渣场周边及下游有 [居民/村庄/城镇/基础设施/河流/水库大坝/
                           水利工程/灌排干渠(沟)] 敏感因素,
        或弃渣场设置在 [沟谷/山区/丘陵区]
    applicable_species: [报告书]
    chapter_ref: null   # 不在正文, 单册另附
    content_spec: |
      模拟不同重现期洪水冲刷 / 类似地区历史最大极端降雨 /
      整体失事 / 多重不利叠加情况下的:
        - 滑出渣量 / 滑移距离 / 滑移速度
        - 堆积范围 / 堆积深度
        - 沟道及失事影响范围纵剖面图
      充分考虑极端暴雨/地质灾害, 论证对下游人民群众生命财产、
      基础设施、河流沟谷行洪安全的影响
    format_spec:
      delivery: 单册另附
      binding: 独立装订
    data_source_refs:
      - engine.SpoilStabilityEngine
      - field.fact.construction.temp_topsoil_site
    required_assurance_refs:
      - as.commitment.spoil_failure_report_truth   # 建设单位真实性承诺
    renderer: SubReportRenderer
    output_formats: [pdf, docx]
    v0_input: |
      v0 阶段本专题不自动生成, 由用户上传 PDF 作为单册附件。
      系统仍须验证承诺书已签署。

# ============================================================
# Registry 自身的 lint 规则
# ============================================================
registry_lints:
  - id: ART_001
    rule: 每个 artifact 必须声明 id/kind/canonical_name/source/requirement
    severity: ERROR
    scope: all artifacts

  - id: ART_002
    rule: conditional artifact 必须声明 condition.trigger_obligation_id (或 trigger_obligation_ids)
    severity: ERROR
    scope: artifacts with requirement == conditional

  - id: ART_003
    rule: 所有 trigger_obligation_id 必须在 ObligationSet_v0.yaml 中 resolve
    severity: ERROR
    scope: condition blocks
    note: 交叉验收时启用

  - id: ART_004
    rule: 所有 data_source_refs 中的 field.* 必须在 FieldIdentityRegistry 中 resolve
    severity: ERROR
    scope: artifact.data_source_refs

  - id: ART_005
    rule: 所有 required_assurance_refs 必须在 AssuranceRegistry 中 resolve
    severity: ERROR
    scope: artifact.required_assurance_refs
    note: AssuranceRegistry_v0 尚未产出, 此规则 v0 阶段挂起

  - id: ART_006
    rule: chapter_ref 必须是合法 stable section id (sec.*)
    severity: ERROR
    scope: artifact.chapter_ref (非 null 时)

