# CPSWC Artifact Registry v0
#
# 功能: 报告书所有法定制品 (附表/附图/附件/专题册) 的权威注册表
# 约束: CPSWC_ARCHITECTURE_DECISIONS.md (决议 2, 3) + CPSWC_CORE_CONTRACTS.yaml
#
# 命名: art.<kind>.<short_name>, 参见 contracts.id_namespaces.artifact
# kind enum: table | figure | attachment | subreport | spec_sheet | cover
#
# 本文件是 ObligationSet_v0 的 required_artifact_refs 的查找表。
# 任何 obligation 引用的 artifact, 必须在本文件中可解析, 否则 CORE_CONTRACTS_001 报错。
#
# 来源:
#   - 2026 模板附件 1 报告书编制内容 (附表/附件/附图清单)
#   - 2018 格式规定 (封面/扉页/责任页等装订件)
#   - 广东/惠州地方口径 (待扩展)

version: v0
generated_at: 2026-04-11
applicable_species: [报告书]
constraint_docs:
  - CPSWC_ARCHITECTURE_DECISIONS.md
  - CPSWC_CORE_CONTRACTS.yaml

# ============================================================
# 制品通用 schema
# ============================================================
# 每个 artifact 必须声明:
#   id              — 本文件的 art.* 主键
#   kind            — table / figure / attachment / subreport / spec_sheet / cover
#   canonical_name  — 正式名称
#   source          — 规则依据
#   requirement     — always / conditional
#   condition       — (if conditional) 触发条件 (指向 obligation_id 或描述)
#   applicable_species — 适用文档物种
#   chapter_ref     — 出现章节 (stable_id)
#   content_spec    — 内容依据 (模板文号 + 章节)
#   format_spec     — 格式依据 (2018 格式或 2026 附件 2)
#   data_source_refs — 数据来源 (指向 field.* 或 engine.*)
#   renderer        — 渲染器类型
#   output_formats  — 输出格式 enum
#   delivery_mode   — 交付包中位置 (inline / bound / single_copy)

# ============================================================
# 1. 封面 / 扉页 / 责任页 (装订件)
# ============================================================
artifacts:

  art.cover.report_book_cover:
    kind: cover
    canonical_name: 水土保持方案报告书封面
    source: 2026_template_annex_2
    requirement: always
    applicable_species: [报告书]
    chapter_ref: null
    content_spec: 2026 模板附件 2 第二条
    format_spec:
      paper: A4
      color: 湖蓝色
      title_font: {face: 宋体, size: 二号, bold: true}
      title_last_line: 水土保持方案报告书
      title_last_line_font: {face: 黑体, size: 小初}
      bottom_items: [建设单位全称, 编制单位全称, 编写年月]
      bottom_font: {face: 宋体, size: 三号}
    data_source_refs:
      - field.fact.project.name
      - field.fact.party.construction_unit
      - field.fact.party.compile_unit
    renderer: CoverRenderer
    output_formats: [pdf, docx]
    delivery_mode: single_copy  # 单面打印

  art.cover.title_page:
    kind: cover
    canonical_name: 扉页
    source: 2026_template_annex_2
    requirement: always
    applicable_species: [报告书]
    content_spec: 2026 模板附件 2 第三条 (版式要求与封面相同)
    format_spec:
      layout: same_as_cover
      seal: 建设单位 + 编制单位名称处加盖公章
      multi_party: 多家编制单位的, 应分别加盖公章
    data_source_refs:
      - field.fact.project.name
      - field.fact.party.construction_unit
      - field.fact.party.compile_unit
    renderer: CoverRenderer
    output_formats: [pdf, docx]
    delivery_mode: single_copy

  art.cover.responsibility_page:
    kind: cover
    canonical_name: 责任页
    source: 2026_template_annex_2
    requirement: always
    applicable_species: [报告书]
    content_spec: 2026 模板附件 2 第四条
    format_spec:
      roles_order: [批准, 核定, 审查, 校核, 项目负责人, 编写]
      sign_mode: 亲笔签名
      approver_constraint: 批准人员中须有编制单位有关负责同志
      writer_grouping: 编写人员按其参编章节分别列明
      report_name_font: {face: 黑体, size: 三号}
      role_labels_font: 黑体
      other_font_size: 四号
      name_and_task_font: 宋体
      multi_org_lead: 多家编制单位的须明确牵头单位, 按编制单位和参编章节分别列明
    data_source_refs:
      - field.fact.project.name
      - field.fact.party.compile_unit
    required_assurance_refs:
      - as.signature.responsibility_page
      - as.seal.compile_unit_sealing
    renderer: ResponsibilityPageRenderer
    output_formats: [pdf, docx]
    delivery_mode: single_copy

  art.cover.toc:
    kind: cover
    canonical_name: 目录
    source: 2026_template_annex_2
    requirement: always
    applicable_species: [报告书]
    content_spec: 生成两级目录
    format_spec:
      levels: 2
      heading_font: {face: 黑体, size: 三号}
      other_font: {face: 仿宋, size: 四号}
      spacing: 标准字符间距和行间距
    data_source_refs: []  # 由章节树派生, 不直接引用 field
    renderer: TocRenderer
    output_formats: [pdf, docx]

# ============================================================
# 2. 特性表 (法定汇总表)
# ============================================================

  art.spec_sheet:
    kind: spec_sheet
    canonical_name: 水土保持方案特性表
    source: 2026_template_annex_1_table_1
    requirement: always
    applicable_species: [报告书, 整体变更报告书]
    chapter_ref: sec.overview.spec_sheet_end   # 附综合说明末
    content_spec: |
      2026 模板附件 1 表 1
      包含: 项目名称代码, 涉及流域省市县, 项目规模(总投资/土建投资),
            开完工时间/设计水平年, 三类占地, 土石方六元组,
            涉及重点预防治理区/敏感区, 地貌/侵蚀类型强度/容许流失,
            防治责任范围面积/容许流失/新增流失/可减少流失,
            防治目标六率, 防治措施及数量分区表,
            投资/监测/独立/监理/补偿费分项, 单位信息
    format_spec:
      embedded: true
      paper: A4 (可加大)
      within_chapter: 综合说明末
    data_source_refs:
      # 特性表的所有字段都经由 proj.spec_sheet.* 投影派生, 不直接引 field.*
      projection_root: proj.spec_sheet
    renderer: SpecSheetRenderer
    output_formats: [pdf, docx]
    lint_rules:
      - 特性表字段必须与 FieldIdentityRegistry 中声明 proj.spec_sheet.* 投影的所有 field 一致
      - 任何 field 投影到 proj.spec_sheet.* 但本表未渲染该行, 视为 lint ERROR

# ============================================================
# 3. 附表 (3 项)
# ============================================================

  art.table.responsibility_range_by_admin_division:  # AT-01
    kind: table
    canonical_name: 防治责任范围统计表
    source: 2026_template_annex_1
    requirement: conditional
    condition:
      trigger_obligation_id: ob.sensitive_overlay.multi_admin_breakdown
      human: 涉及两个及以上行政区时
    applicable_species: [报告书]
    chapter_ref: sec.soil_loss_prevention.responsibility_range_by_county
    content_spec: 按县级行政区列明防治责任范围面积
    format_spec:
      appendix_position: 正文后附表
    data_source_refs:
      - field.fact.location.county_list
      - field.fact.land.county_breakdown
      - field.fact.prevention.responsibility_range_area
    renderer: TableRenderer
    output_formats: [pdf, docx]

  art.table.weighted_target_calculation:  # AT-02
    kind: table
    canonical_name: 水土流失防治指标计算表
    source: 2026_template_annex_1
    requirement: conditional
    condition:
      trigger_obligation_id: ob.evaluation.weighted_target_required
      human: 涉及两个及以上防治标准等级时
    applicable_species: [报告书]
    chapter_ref: sec.soil_loss_prevention.targets
    content_spec: 按面积(体积)加权计算综合指标值
    format_spec:
      appendix_position: 正文后附表
    data_source_refs:
      - field.fact.prevention.control_standard_level_breakdown
      - field.derived.target.weighted_comprehensive_target
      - field.fact.natural.water_soil_zoning   # Step 11B: 决定适用哪张 GB/T 50434 表
    produced_by_calculator: cal.target.weighted_comprehensive  # Step 11B
    renderer: TableRenderer
    output_formats: [pdf, docx]

  art.table.investment_appendix:  # AT-03
    kind: table
    canonical_name: 投资附件
    source: 2026_template_annex_1
    requirement: always
    applicable_species: [报告书]
    chapter_ref: sec.investment.summary
    content_spec: |
      2026 模板 9.1.2 要求的估算成果, 含以下 10 表:
        1. 投资估算总表
        2. 工程措施估算表
        3. 植物措施估算表
        4. 临时措施估算表
        5. 水土保持监测措施估算表
        6. 分年度投资估算表
        7. 独立费用计算表
        8. 水土保持补偿费计算表
        9. 工程单价汇总表
        10. 施工机械台时费汇总表 (+ 主要材料单价汇总表)
    format_spec:
      appendix_position: 正文后附件区
    data_source_refs:
      - engine.InvestmentEstimationSubsystem
    renderer: InvestmentTableBundleRenderer
    output_formats: [pdf, docx, xlsx]
    sub_tables:
      - art.table.investment.total_summary
      - art.table.investment.engineering_measures
      - art.table.investment.plant_measures
      - art.table.investment.temporary_measures
      - art.table.investment.monitoring_measures
      - art.table.investment.annual_breakdown
      - art.table.investment.independent_fees
      - art.table.investment.compensation_fee
      - art.table.investment.unit_prices
      - art.table.investment.machine_hours
      - art.table.investment.material_prices

  # ---- 投资子表 (10+1 张) ----
  art.table.investment.total_summary:
    kind: table
    canonical_name: 投资估算总表
    parent: art.table.investment_appendix
    requirement: always
    data_source_refs: [engine.InvestmentEstimationSubsystem]
    renderer: TableRenderer

  art.table.investment.engineering_measures:
    kind: table
    canonical_name: 工程措施估算表
    parent: art.table.investment_appendix
    requirement: always
    data_source_refs: [engine.InvestmentEstimationSubsystem]
    renderer: TableRenderer

  art.table.investment.plant_measures:
    kind: table
    canonical_name: 植物措施估算表
    parent: art.table.investment_appendix
