  # 本三字段 (prevention.zones / prevention.measures_layout / measures.classification)
  # 落地 governance/PREVENTION_SYSTEM_CONTRACT.md v0.6 Planning Baseline 的三大真源。
  # 结构遵循契约 §4.1 / §5.1 / §6.1 canonical schema; 消费者 (tables / narrative /
  # figures / obligation evidence) 统一归并到 lineage.projection_target_refs,
  # FIR 不新增 feeds_* 分类键 (Step 51 裁决, 保持现有 FIR 扫描风格不裂).

  field.fact.prevention.zones:
    canonical_name: 防治分区记录
    semantic_type: list_of_records
    stable_id_namespace: zone.*
    record_schema:
      zone_id: string                   # stable_id, 必须 zone.<snake_case>
      zone_label: string                # 项目内显示名, 可自定义 (如 "1# 临时堆土区")
      zone_parent_type: enum            # 取值解析 registries/PreventionZoneTypeRegistry_v0.yaml
      description: string               # 分区范围/特征的简要描述
      area_ha: number                   # 分区面积, 单位 hm²
      area_permanent_ha: number         # 其中永久占地面积, 可选
      area_temporary_ha: number         # 其中临时占地面积, 可选
      land_use_refs: [string]           # 引用 field.fact.land.* 中的占地类型 id, 依据关系不代表同构
      within_responsibility_range: bool # 必须 true; 契约 §4.3 PREVENTION_ZONE_002 ERROR
      evidence_anchor_refs: [string]    # 决议 8 双锚 (记录级)
      normative_basis_refs: [string]    # 决议 8 双锚 (记录级)
      authored_by: string
      authored_at: string               # ISO 日期
    protection_level: CRITICAL
    fact_class: F1_manual               # 设计院/水保编制方手工提供; 不可 calculator 派生, 不可样稿抄录
    origin: fact
    source: governance/PREVENTION_SYSTEM_CONTRACT.md §4.1
    note: |
      Ch7.4 防治分区唯一真源 (契约 §1.3 宪法核心). 本方案任何分区名/分区面积的消费
      必须经此字段经 projection; narrative 模板与 AST 生成器禁止硬编码分区名 (决议 4).

      zone_parent_type 的合法取值由 PreventionZoneTypeRegistry_v0.yaml 的 tier=core
      五类 + 已正式登记 tier=extended 解析得出. v0.6 阶段仅核心五类合法
      (main_engineering / road_square / landscape_greening / construction_living /
      temp_soil_stockpile). 未登记扩展类型 → lint ERROR (PREVENTION_ZONE_002_TYPE_RESOLUTION,
      规则落地见 Step 51-B 之后的 lint 扩展步骤).

      红线 (契约 §十):
        - 红线 1 不得样稿抄录: evidence_anchor_refs 全部指向样稿资源 → PROV_ZONE_001 ERROR
        - 红线 2 每条必须有 zone_id: STABLE_ID_001 ERROR
        - 红线 4 zones 与 measures_layout 分层独立, 不得合并结构
    normative_basis_refs:
      - rule.gb_50433_2018.chapter_6               # GB 50433 第 6 章 水土流失防治
    evidence_anchor_refs: []                        # fact 源头, 证据挂在每条记录内
    authority_class: mandatory_standard             # GB 50433 不含 /T
    precedence_rank: 3
    lineage:
      upstream_deps:
        - field.fact.prevention.responsibility_range_area   # 分区面积受责任范围约束
        - field.fact.land.total_area                         # 责任范围与占地的面积守恒 (PREVENTION_ZONE_001/003)
      derivation: null
      projection_target_refs:
        - art.table.prevention_zones_summary                # Ch7.4 分区汇总表 (CAN_GENERATE, Step 52 LIVE)
        - art.table.responsibility_range_by_admin_division  # 责任范围统计表 (面积来源之一)
        - art.spec_sheet                                    # 特性表分区面积栏
        - sec.prevention.zones                              # Ch7.4 分区划分叙述
        - sec.prevention.overall_layout                     # Ch7.5 引用分区名
        - sec.prevention.zone_measures                      # Ch7.7 引用 zone_id
        - art.figure.F_04_responsibility_range              # 分区叠加责任范围
        - art.figure.F_10_measures_layout                   # 措施按分区落图
      invalidation_targets: []                              # v0.6 无 derived 被本字段直接驱动; 下游 narrative/table 重投影由 projection 层负责
    validation:
      rule: |
        - 每条记录 zone_id 在本列表内唯一 (红线 2 + STABLE_ID_001)
        - 每条 within_responsibility_range == true (契约 §4.3 PREVENTION_ZONE_002)
        - ∑ area_ha ≤ prevention.responsibility_range_area (契约 §4.3 PREVENTION_ZONE_001 代数守恒)

  field.fact.prevention.measures_layout:
    canonical_name: 措施布设记录 (纳入水保的措施真源)
    semantic_type: list_of_records
    stable_id_namespace: measure.*
    record_schema:
      measure_id: string                # stable_id, 必须 measure.<snake_case>
      measure_name: string              # 显示名, 如 "浆砌石挡墙"
      measure_type: enum                # 三类闭集: engineering / plant / temporary (契约 §5.4, v0.6 不含 monitoring)
      zone_refs: [string]               # 关联 zone_id, 至少 1 个 (红线 3)
      primary_zone_ref: string          # 跨区措施必填, 投资归口按此单一归属
      source_attribution: enum          # existing_main_engineering / new_in_plan (两条路径归一化)
      classification_ref: string        # source_attribution=existing_main_engineering 必填, 指向 cls.*
                                        # source_attribution=new_in_plan 可空
      specification: string             # 规格/结构描述 (如 "M7.5 浆砌石, 宽 0.5m, 高 1.2m")
      quantity: number                  # 工程量数值
      unit: string                      # 单位 (m / m² / m³ / hm² / 株 / 处)
      quantity_source: string           # 工程量来源 (措施设计 / 类比估算 / 设计院提供)
      related_monitoring_refs: [string] # 监测关联, v0.6 允许全空; v0.7 监测 schema 落地后接线
      evidence_anchor_refs: [string]    # 决议 8 双锚 (记录级)
      normative_basis_refs: [string]    # 决议 8 双锚 (记录级)
      authored_by: string
      authored_at: string
    protection_level: CRITICAL
    fact_class: F1_manual               # 设计院提供措施名/类型/归属/工程量; 单价在 investment 侧属 F2
    origin: fact
    source: governance/PREVENTION_SYSTEM_CONTRACT.md §5.1
    note: |
      Ch7.5 / Ch7.7 措施布设唯一真源 (契约 §1.3 宪法核心).

      SoT 边界 (契约 §5.2, D1 批示): 本字段是**纳入本方案水保体系的措施**的真源,
      不是全主体工程措施宇宙真源. 主体工程中经 classification 认定为 excluded 的措施
      **不进入**本列表, 仅在 measures.classification[] 留痕用于 Ch3.7 叙述.

      两条流入路径 (契约 §5.3):
        A (主体已列) classification[verdict∈{included,partially_included}]
                    → source_attribution=existing_main_engineering + classification_ref 必填
        B (方案新增) 水保方案设计
                    → source_attribution=new_in_plan + classification_ref 可空
      两路径进入后必须归一化为同一 canonical schema.

      跨区措施 (红线 3): zone_refs[] 登记全部涉及分区; primary_zone_ref 必填,
      工程量按主归属分区计一次, 禁止在跨区分区分别登记绕过.

      与 investment.measures_registry 的关系 (契约 §2.3 兼容期):
        - 真源归属本字段
        - investment.measures_registry 降级为投资消费视图
        - 兼容期截止 v0.7 Phase 1, 届时代码层完成对齐或走 RFC 延期

      红线 4: 与 measures.classification[] 分层独立, 禁止合并为单一记录结构.
    normative_basis_refs:
      - rule.gb_50433_2018.chapter_6         # 防治措施布设
      - rule.gb_t_51018_2014.measures_system  # 措施体系
    evidence_anchor_refs: []
    authority_class: mandatory_standard
    precedence_rank: 3
    lineage:
      upstream_deps:
        - field.fact.prevention.zones               # 通过 zone_refs 依赖分区真源
        - field.fact.measures.classification        # 路径 A 通过 classification_ref 依赖界定记录
      derivation: null
      projection_target_refs:
        - art.table.measures_layout_by_zone         # Ch7.7 分区措施布设表
        - art.table.measures_overall_layout         # Ch7.5 措施体系表
        - art.table.investment.engineering_measures # 投资估算附表 2 (视图消费)
        - art.table.investment.plant_measures       # 投资估算附表 3 (视图消费)
        - art.table.investment.temporary_measures   # 投资估算附表 9 (视图消费)
        - sec.prevention.overall_layout             # Ch7.5
        - sec.prevention.zone_measures              # Ch7.7, 逐区展开
        - sec.evaluation.measures_classification    # Ch3.7 反向索引作为 cls 的结果视图
        - art.figure.F_10_measures_layout
      invalidation_targets:
        - field.fact.investment.measures_registry   # 契约 §2.3 兼容期投资视图, 真源在此, 视图需同步; v0.7 Phase 1 降级
    validation:
      rule: |
        - 每条 measure_id 在本列表内唯一 (红线 2 + STABLE_ID_001)
        - zone_refs 至少 1 个且每项能在 prevention.zones[] 解析 (红线 3 + PREVENTION_XLAYER_004)
        - primary_zone_ref ∈ zone_refs (PREVENTION_XLAYER_005)
        - source_attribution=existing_main_engineering 时 classification_ref 非空且能解析 (PREVENTION_XLAYER_001)
        - measure_type ∈ {engineering, plant, temporary} (v0.6 不含 monitoring)

  # -------- 措施界定 (Ch3.7) --------
  # 与防治分区/措施布设分层独立 (红线 4). 本字段是 Ch3.7 核心真源.

  field.fact.measures.classification:
    canonical_name: 水保功能措施界定记录
    semantic_type: list_of_records
    stable_id_namespace: cls.*
    record_schema:
      classification_id: string         # stable_id, 必须 cls.<snake_case>
      source_item_name: string          # 主体工程项名称, 如 "项目红线内 6m 宽沥青道路"
      source_item_type: string          # 主体工程项类型 (道路 / 绿化 / 挡墙 / 排水 / 边坡防护 ...)
      source_item_ref: string           # 主体工程设计已结构化时指向其 id, 否则空字符串
      verdict: enum                     # 三态闭集: included / excluded / partially_included (契约 §6.2)
      inclusion_reason: string          # verdict=included 必填; 说明水保功能
      exclusion_reason: string          # verdict=excluded 必填; 说明不纳入的专业判断
      partial_scope_note: string        # verdict=partially_included 必填 (契约 §6.3 硬规则)
      expert_switch_basis:              # 决议 6 + 契约 §6.4, 9 键完整 governance_block (record-level)
        source_rule_id: string              # 法规/标准条款 id
        human_decision_question: string     # 专家回答的决策问题原文
        decision_owner_role: string         # 填写者角色, 通常 registered_wsc_engineer
        default_value: null                 # 界定无默认值, 必须专家判断
        evidence_expectation: string        # 期望证据描述 (如 "主体施工图 + 水保功能分析")
        replaced_normative_semantics:       # 本记录替代/承接的规范语义
          - rule_ref: string                # 引用条款号
            quoted_phrase: string           # 规范原文片段
            why_not_calculable: string      # 为何不可机械判定
        upgrade_path:
          strategy: enum[irreducible]       # 契约 §6.4 锁死, v0.6 及之后不接 calculator
          irreducibility_justification: string  # 必须引规范条款说明不可计算化的理由
        authored_by: string
        authored_at: string
      resulting_measure_refs: [string]  # verdict∈{included,partially_included} 时指向 measures_layout[].measure_id
      evidence_anchor_refs: [string]    # 决议 8 双锚 (记录级)
      normative_basis_refs: [string]    # 决议 8 双锚 (记录级)
    protection_level: PROTECTED         # 契约 §6.1 明示 (非 CRITICAL; 单条界定错误不直接致报告失效, 由 XLAYER_001/002 兜底)
    fact_class: F1_manual               # 专家认定, 不可派生
    origin: fact
    source: governance/PREVENTION_SYSTEM_CONTRACT.md §6.1
    note: |
      Ch3.7 水保功能措施界定唯一真源 (契约 §1.3 宪法核心).

      概念 (契约 §3.3): 对主体工程设计中已有工程/设施, 判断其是否具有水土保持功能,
      从而决定是否纳入水保措施体系.

      verdict 三态 (契约 §6.2):
        included            完全纳入 → 驱动 measures_layout 一条或多条 (source_attribution=existing_main_engineering)
        excluded            不具备水保功能, 仅在 classification[] 留痕
        partially_included  部分纳入 → measures_layout 记录 + partial_scope_note 必填
                            "可拆则拆" 硬规则: 能拆成 included + excluded 两条的必须拆分,
                            不得用 partially_included 逃避 (契约 §6.3)

      expert_switch_basis 是 record-level 专家确认块 (不同于 disposal_site.failure_analysis_required
      的字段级 governance_block). 因为每条界定的专家依据可能不同, 治理必须跟着 record 走.

      upgrade_path.strategy 锁定为 irreducible (契约 §6.4):
        措施界定本质上是对规范文字 (如 GB 50433-2018 相关条款中的"具有水土保持功能") 的专家解读,
        无法被算法化. v0.6 及之后版本永不接 calculator.

      红线 4 (契约 §十): classification 与 measures_layout 分层独立, 禁止合并为单一记录结构.
    normative_basis_refs:
      - rule.gb_50433_2018.chapter_6           # GB 50433 第 6 章 (水保功能措施)
    evidence_anchor_refs: []
    authority_class: mandatory_standard
    precedence_rank: 3
    lineage:
      upstream_deps: []                         # 源自主体工程设计判断, 无 FIR 内上游
      derivation: null
      projection_target_refs:
        - art.table.measures_classification     # Ch3.7 措施界定表 (CAN_GENERATE, Step 52 LIVE)
        - sec.evaluation.measures_classification # Ch3.7 界定叙述
      invalidation_targets: []                  # classification 改动通过 measures_layout.classification_ref 反向触发, 非直接派生
    validation:
      rule: |
        - 每条 classification_id 在本列表内唯一 (红线 2 + STABLE_ID_001)
        - verdict ∈ {included, excluded, partially_included}
        - verdict=included → inclusion_reason 非空
        - verdict=excluded → exclusion_reason 非空
        - verdict=partially_included → partial_scope_note 非空 且 expert_switch_basis.source_rule_id 非空 (契约 §6.3 CLASSIFICATION_PARTIAL_001, lint 规则 Step 51-B 落地)
        - expert_switch_basis 必须含 source_rule_id / human_decision_question / upgrade_path.strategy / replaced_normative_semantics / authored_by (Step 51-B MEASURES_CLASSIFICATION_GOVERNANCE_001)
        - expert_switch_basis.upgrade_path.strategy == "irreducible" (契约 §6.4 锁死)

  # -------- 施工组织 --------
  field.fact.construction.living_area:
    canonical_name: 施工生产生活区
    semantic_type: list_of_records
    record_schema:
      name: string
      location: Coordinate
      area: Area
      purpose: string
      vertical_layout: text
    protection_level: PROTECTED
    source: 2026_template_2_2_1
    lineage:
      projection_target_refs:
        - sec.project_overview.construction.living_area

  field.fact.construction.road:
    canonical_name: 施工道路
    semantic_type: list_of_records
    record_schema:
      name: string
      nature: enum[新建, 改建, 利用]
      length: Quantity
      width: Quantity
      area: Area
      structure: string
    protection_level: PROTECTED
    source: 2026_template_2_2_2
    lineage:
      projection_target_refs:
        - sec.project_overview.construction.road

  field.fact.construction.temp_topsoil_site:
    canonical_name: 临时堆土场
    semantic_type: list_of_records
    record_schema:
      name_or_id: string
      location: Coordinate
      type: enum[临时中转场, 周转场, 转存场, 表土堆场]
      area: Area
      storage_volume: Volume
      storage_duration: string
      source: string
      flow_to: string
      outside_permanent_land: bool   # v0 新增: 是否位于项目永久占地范围外
                                     # true → 触发 AF-3 权属确认意见义务
                                     # false → 在永久占地内, 不触发 AF-3
    protection_level: CRITICAL
    source: 2026_template_2_2_7
    lineage:
      projection_target_refs:
        - sec.project_overview.construction.temp_topsoil_site
        - sec.disposal_site.source_and_flow
        - art.figure.F_12_borrow_and_disposal_location
      invalidation_targets:
        - ob.disposal_site.*  # 有临时堆土场触发弃渣场相关义务
        - ob.disposal_site.land_use_approval  # outside_permanent_land 驱动 AF-3

  # -------- 弃渣场/临时堆土场级别评定 --------
  # Step 11C: 重构为弃渣场级别评定的上游输入载体
  # - 本字段只承载原始测量/判断输入 (volume / max_height / downstream_harm_class)
  # - 级别结论由 cal.disposal_site.level_assessment 根据 GB 51018 表 5.7.1 计算,
  #   落在 field.derived.disposal_site.level_assessment.level (见下方 derived 节)
  # - obligation trigger 迁移到 derived 路径, 见 ObligationSet_v0.yaml
  field.fact.disposal_site.level_assessment:
    canonical_name: 弃渣场原始输入 (体积/高度/危害)
    semantic_type: list_of_records
    record_schema:
      site_id: string                   # 弃渣场唯一标识
      site_name: string
      volume: Quantity                  # 堆渣量, 万 m³; GB 51018 表 5.7.1 维度 1
      max_height: Quantity              # 最大堆渣高度, m; GB 51018 表 5.7.1 维度 2
      downstream_harm_class: enum[严重, 较严重, 不严重, 较轻, 无危害]  # GB 51018 注 3
      _assessment_note: string          # 审计说明, 解释 downstream_harm_class 的专业判断依据
    protection_level: CRITICAL
    origin: fact
    source: GB 51018-2014 §5.7.1 upstream inputs
    note: |
      Step 11C 重构: 本字段只承载弃渣场级别评定的**原始输入**,
      不再承载 level 结论。level 由 cal.disposal_site.level_assessment
      按 GB 51018 表 5.7.1 "就高不就低" 规则计算, 产出
      field.derived.disposal_site.level_assessment。

      ★ 命名边界: 本字段仅适用于**弃渣场** (spoil dumps),
      不包含表土堆场 / 临时中转场等 —— 后者在
      field.fact.construction.temp_topsoil_site 独立管理。

      ★ downstream_harm_class 的语义 (GB 51018 注 2+3):
        严重    相关建筑物遭大破坏, 可能人员伤亡/重大财产损失
        较严重  相关建筑物遭较大破坏, 需专门修复才能使用
        不严重  相关建筑物遭破坏, 及时修复即可使用
        较轻    相关建筑物受影响很小, 无需修复即可使用
        无危害  (规范未明确, 工程实践默认对应无影响类)

      这是一个 enum 型专家判断字段, 严格不在决议 6 管辖
      (决议 6 scope = bool)。11C 未将其纳入 governance_block,
      保留 _assessment_note 作为审计说明位, 解释枚举值的判断依据。
    normative_basis_refs:
      - rule.gb_51018_2014.section_5_7_1      # GB 51018 §5.7.1 弃渣场级别
      - rule.gb_51018_2014.table_5_7_1_notes  # 注 1 "就高不就低" + 注 2/3 危害定义
    evidence_anchor_refs: []   # fact 源头, 无下游 evidence
    authority_class: mandatory_standard  # GB 51018 不含 /T, 强制性标准
    precedence_rank: 3
    lineage:
      upstream_deps: []
      derivation: null
      projection_target_refs:
        - sec.disposal_site.site_selection
        - art.table.spoil_summary
      invalidation_targets:
        - field.derived.disposal_site.level_assessment   # 驱动 calculator 重算
    validation:
      rule: |
        - volume > 0 且 max_height > 0
        - downstream_harm_class 必须是 GB 51018 注 3 列出的 5 个枚举之一
        - site_id 在一份 list 内唯一

  field.fact.disposal_site.failure_analysis_required:
    canonical_name: 是否需要开展弃渣场失事影响专题分析
    semantic_type: bool
    protection_level: CRITICAL
    source: cpswc_v0_internal
    note: |
      v0 专家确认型总开关, 默认 false。

      法定触发条件 (2026 模板 5.2):
        - 弃渣场/临时堆土场位于沟谷、山区、丘陵区
        - OR 周边及下游存在敏感因素
          (居民 / 村庄 / 城镇 / 基础设施 / 河流 / 水库大坝 / 水利工程 / 灌排干渠沟)

      v0 将这两类条件合并为一个 bool 总开关, 由专家判断后填写。
      v1 将拆成 `landform_hazard_class` + `downstream_sensitive_factors[]`
         两个显式字段, 并自动推导本字段。

      惠州房地产 / 城建项目默认为 false (冲积平原 + 无下游敏感)。
    lineage:
      upstream_deps:
        - field.fact.natural.landform_type
        - field.fact.construction.temp_topsoil_site
      derivation: null
      projection_target_refs:
        - sec.disposal_site.site_selection
      invalidation_targets:
        - ob.disposal_site.failure_analysis
        - as.commitment.spoil_failure_report_truth   # 专题触发时连带承诺书
    validation:
      default: false
      rule: 若任一临时堆土场位于沟谷/山区/丘陵 OR 下游有敏感要素, 须改为 true
    governance_block:
      # 依据: 决议 6 ExpertSwitch Governance
      # 本字段是 v0 中第一个规范化落地的 expert-switch, 作为全局合规样本
      source_rule_id: rule.template_2026.section_5_2.disposal_failure_analysis
      human_decision_question: |
        本项目的弃渣场 / 临时堆土场是否满足下列任一条件:
          (a) 位于沟谷、山区、丘陵区;
          (b) 周边及下游存在敏感因素
              (居民 / 村庄 / 城镇 / 基础设施 / 河流 / 水库大坝 /
               水利工程 / 灌排干渠沟)?
        如满足任一条件, 须开展失事影响专题分析并提交对应承诺书。
      decision_owner_role: registered_wsc_engineer
      default_value: false
      evidence_expectation: |
        - 若 true: 须提供失事影响专题分析报告 + as.commitment.spoil_failure_report_truth
        - 若 false: 须在本字段 note 中记录判断依据
          (场地地形类型 / 下游敏感性排查结论)
      replaced_normative_semantics:
        - rule_ref: 2026 模板 §5.2 (弃渣场)
          quoted_phrase: |
            位于沟谷、山区、丘陵区,
            或周边及下游存在敏感因素的弃渣场, 应进行失事影响专题分析
          why_not_calculable: |
            "沟谷/山区/丘陵"的地形判定与"敏感因素"的列举边界均依赖
            现场综合判断; 现阶段缺乏足够的地形分类数据源与敏感要素
            空间数据层, 无法做到谓词级可计算, 必须由专家确认。
      upgrade_path:
        strategy: splittable
        planned_split_fields:
          - field.fact.disposal_site.landform_hazard_class     # 枚举: 平原/丘陵/山区/沟谷
          - field.fact.disposal_site.downstream_sensitive_factors  # list[enum]
        refinement_notes: null
        irreducibility_justification: null
      sunset_target_version: v1
      authored_by: cpswc_architect
      authored_at: 2026-04-11

  # -------- 单位与责任主体 --------
  field.fact.party.compile_unit:
    canonical_name: 方案编制单位
    semantic_type: record
    record_schema:
      name: string
      legal_representative: string
      unified_social_credit_code: string
      address: string
      contact_person: string
      phone: string
      email: string
    protection_level: PROTECTED
    source: 2026_template_table_1
    lineage:
      projection_target_refs:
        - proj.spec_sheet.compile_unit
        - proj.report_form.compile_unit
        - sec.title_page.compile_unit
        - art.cover.responsibility_page

  field.fact.party.construction_unit:
    canonical_name: 建设单位
    semantic_type: record
    record_schema:
      name: string
      legal_representative: string
      unified_social_credit_code: string
      address: string
      contact_person: string
      phone: string
      email: string
    protection_level: PROTECTED
    source: 2026_template_table_1
    lineage:
      projection_target_refs:
        - proj.spec_sheet.construction_unit
        - proj.report_form.construction_unit
        - sec.title_page.construction_unit
        - art.cover.report_book_cover

# ============================================================
# DERIVED DOMAIN - 派生量字段
# ============================================================
# 每个派生字段必须:
#   1. 有 upstream_deps (至少一个 fact field)
#   2. 有 derivation (计算表达式或引用的 Calculator)
#   3. upstream 变动时整个派生链失效重算

  # -------- 土石方派生 --------
  field.derived.earthwork.excavation_utilization_ratio:
    canonical_name: 挖方利用率
    semantic_type: percent
    precision: 0.1
    protection_level: CRITICAL
    # Step 11B: 补 SOURCE_AUTH_001 欠账 (provenance only, 不建 calculator)
    # 本字段是纯算数比率, 上游全部为已登记 fact field, 不构成 calculator 候选。
    origin: derived
    source: 2026_template_table_1  # 2026 模板表 1 (项目水土保持工程特性表)
    note: |
      用于项目自身填筑和骨料等建筑材料的挖方数量与挖方总量之比。
      本字段依据 2026 模板表 1 中"挖方利用率"条目要求登记。
    # 决议 8 双锚 (provenance-only, 不走 calculator)
    normative_basis_refs:
      - rule.template_2026.table_1.earthwork_balance  # 2026 模板表 1 土石方平衡
      - rule.gb_50433_2018.earthwork_summary          # GB 50433-2018 土石方平衡要求
    evidence_anchor_refs:
      - field.fact.earthwork.self_reuse
      - field.fact.earthwork.excavation
    authority_class: mandatory_standard  # GB 50433 强制性标准
    precedence_rank: 3
    lineage:
      upstream_deps:
        - field.fact.earthwork.self_reuse
        - field.fact.earthwork.excavation
      derivation: |
        ratio = (self_reuse / excavation) * 100
        单位: 百分比, precision 0.1
        约束: 0 <= ratio <= 100
      projection_target_refs:
        - proj.spec_sheet.excavation_utilization_ratio
        - sec.overview.project_basic
        - sec.evaluation.earthwork_balance
      invalidation_targets:
        - proj.spec_sheet.excavation_utilization_ratio
        - sec.evaluation.earthwork_balance
    validation:
      rule: 0 <= value <= 100

  field.derived.earthwork.comprehensive_reuse_ratio:
    canonical_name: 弃渣综合利用率
    semantic_type: percent
    precision: 0.1
    protection_level: CRITICAL
    # Step 11B: 补 SOURCE_AUTH_001 欠账 (provenance only, 不建 calculator)
    origin: derived
    source: 2026_template_table_1
    note: |
      弃渣中被社会综合利用的数量与弃渣总量之比。
      本字段依据 2026 模板表 1 中"弃渣综合利用率"条目要求登记。
    normative_basis_refs:
      - rule.template_2026.table_1.earthwork_balance
      - rule.gb_50433_2018.earthwork_summary
    evidence_anchor_refs:
      - field.fact.earthwork.comprehensive_reuse
      - field.fact.earthwork.spoil
    authority_class: mandatory_standard
    precedence_rank: 3
    lineage:
      upstream_deps:
        - field.fact.earthwork.comprehensive_reuse
        - field.fact.earthwork.spoil
      derivation: |
        ratio = (comprehensive_reuse / spoil) * 100
        单位: 百分比, precision 0.1
        约束: 0 <= ratio <= 100
      projection_target_refs:
        - proj.spec_sheet.comprehensive_reuse_ratio
        - sec.overview.project_basic
        - sec.evaluation.earthwork_balance
      invalidation_targets:
        - proj.spec_sheet.comprehensive_reuse_ratio
    validation:
      rule: 0 <= value <= 100

  # -------- 六项防治指标 (六率) --------
  field.derived.target.control_degree:
    canonical_name: 水土流失治理度
    semantic_type: percent
    precision: 0.1
    protection_level: CRITICAL
    source: 2026_template_table_1
    lineage:
      upstream_deps:
        - field.fact.prevention.treated_loss_area
        - field.fact.prevention.total_loss_area
        - field.fact.prevention.control_standard_level
      derivation: |
        control_degree = treated_loss_area / total_loss_area * 100
        若涉及两个及以上防治标准等级, 按面积加权计算综合指标值
        (参见 field.derived.target.weighted_comprehensive_target)
      projection_target_refs:
        - proj.spec_sheet.control_degree
        - proj.report_form.control_degree
        - sec.soil_loss_prevention.targets
      invalidation_targets:
        - proj.spec_sheet.control_degree
        - proj.report_form.control_degree
    validation:
      rule: 0 <= value <= 100
      standard_ref: 依据防治标准等级查表获得目标值

  field.derived.target.soil_loss_control_ratio:
    canonical_name: 土壤流失控制比
    semantic_type: number
    precision: 0.01
    protection_level: CRITICAL
    source: 2026_template_table_1
    lineage:
      upstream_deps:
        - field.fact.natural.allowable_loss
        - field.fact.prediction.total_loss
      derivation: |
        ratio = allowable_loss / actual_loss_modulus
      projection_target_refs:
        - proj.spec_sheet.soil_loss_control_ratio
        - proj.report_form.soil_loss_control_ratio
        - sec.soil_loss_prevention.targets

  field.derived.target.spoil_protection_rate:
    canonical_name: 渣土防护率
    semantic_type: percent
    precision: 0.1
    protection_level: CRITICAL
    source: 2026_template_table_1
    lineage:
      upstream_deps:
        - field.fact.earthwork.spoil
        - field.fact.prevention.protected_spoil_volume
      derivation: |
        rate = protected_spoil_volume / total_spoil * 100
        其中 protected_spoil_volume 含拦挡+临时防护+综合利用三部分
      projection_target_refs:
        - proj.spec_sheet.spoil_protection_rate
        - proj.report_form.spoil_protection_rate
        - sec.soil_loss_prevention.targets

  field.derived.target.topsoil_protection_rate:
    canonical_name: 表土保护率
    semantic_type: percent
    precision: 0.1
    protection_level: CRITICAL
    source: 2026_template_table_1
    lineage:
      upstream_deps:
        - field.fact.prevention.protected_topsoil_volume
        - field.fact.topsoil.stripable_volume
      derivation: |
        rate = protected_topsoil_volume / stripable_volume * 100
      projection_target_refs:
        - proj.spec_sheet.topsoil_protection_rate
        - proj.report_form.topsoil_protection_rate
        - sec.topsoil.balance
        - sec.soil_loss_prevention.targets

  field.derived.target.vegetation_restoration_rate:
    canonical_name: 林草植被恢复率
    semantic_type: percent
    precision: 0.1
    protection_level: CRITICAL
    source: 2026_template_table_1
    lineage:
      upstream_deps:
        - field.fact.prevention.planned_vegetation_area
        - field.fact.prevention.should_restore_area
      derivation: |
        rate = planned_vegetation / should_restore * 100
      projection_target_refs:
        - proj.spec_sheet.vegetation_restoration_rate
        - proj.report_form.vegetation_restoration_rate
        - sec.soil_loss_prevention.targets

  field.derived.target.vegetation_coverage_rate:
    canonical_name: 林草覆盖率
    semantic_type: percent
    precision: 0.1
    protection_level: CRITICAL
    source: 2026_template_table_1
    note: 林草覆盖率指标应结合水土保持措施布设情况合理确定
    lineage:
      upstream_deps:
        - field.fact.prevention.planned_vegetation_area
        - field.fact.prevention.responsibility_range_area
      derivation: |
        rate = planned_vegetation / responsibility_range * 100
      projection_target_refs:
        - proj.spec_sheet.vegetation_coverage_rate
        - proj.report_form.vegetation_coverage_rate
        - sec.soil_loss_prevention.targets

  # -------- 综合派生 (多等级加权) --------
  # Step 11B: live 化, 由 cal.target.weighted_comprehensive 派生
  field.derived.target.weighted_comprehensive_target:
    canonical_name: 加权综合防治指标值
    semantic_type: record
    record_schema:
      control_degree: percent
      soil_loss_control_ratio: number
      spoil_protection_rate: percent
      topsoil_protection_rate: percent
      vegetation_restoration_rate: percent
      vegetation_coverage_rate: percent
    protection_level: CRITICAL
    origin: derived
    source: cal.target.weighted_comprehensive  # Step 11B live calculator
    note: |
      当一项目涉及两个及以上防治标准等级时, 按面积(体积)加权计算
      六项防治指标的加权综合目标值。
      ref: 2026 模板 7.3.2 + GB/T 50434-2018 第 4 章
      live 执行者: cal.target.weighted_comprehensive
      reference_data: GB/T 50434-2018 表 4.0.2-5 (南方红壤区, v0 仅一张表)
    # 决议 8 双锚必备
    normative_basis_refs:
      - rule.gb_t_50434_2018.chapter_4                # GB/T 50434 第 4 章等级划分
      - rule.gb_t_50434_2018.table_4_0_2_5            # 表 4.0.2-5 南方红壤区
      - rule.template_2026.section_7_3_2              # 2026 模板 7.3.2 加权要求
    evidence_anchor_refs:
      - field.fact.prevention.control_standard_level_breakdown  # 面积加权的主证据
      - field.fact.prevention.control_standard_level            # 单等级兜底
      - field.fact.natural.water_soil_zoning                    # 决定适用哪张 4.0.2-X 表
      - field.fact.prevention.responsibility_range_area
    authority_class: recommended_standard  # GB/T 50434 含 /T, 是推荐性标准
    precedence_rank: 5
    lineage:
      upstream_deps:
        - field.fact.prevention.control_standard_level
        - field.fact.prevention.control_standard_level_breakdown
        - field.fact.prevention.responsibility_range_area
        - field.fact.natural.water_soil_zoning
      derivation: |
        由 cal.target.weighted_comprehensive (Step 11B live calculator) 计算:

        若 control_standard_level_breakdown 有 >= 2 个等级:
          按面积权重 w_i = area_i / sum(area) 对每项指标加权:
            weighted_value = sum(w_i * target_value(zone_level_i, indicator))
          其中 target_value 从 GB/T 50434 表 4.0.2-X 按 water_soil_zoning 查表。

        若 control_standard_level_breakdown 只有 1 个等级:
          直接取该等级的表值 (单等级兜底)。
      projection_target_refs:
        - art.table.weighted_target_calculation   # AT-02
        - sec.soil_loss_prevention.targets
      invalidation_targets:
        - art.table.weighted_target_calculation
    validation:
      trigger_condition: 涉及两个及以上防治标准等级
      rule: |
        六项值须与 GB/T 50434 对应 water_soil_zoning 表的面积加权结果一致,
        允许容差: 百分比类 ±0.5, 控制比 ±0.01

  # -------- 弃渣场级别派生 (Step 11C 首次 fact→calculator→derived→trigger 链路) --------
  # 由 cal.disposal_site.level_assessment 按 GB 51018 表 5.7.1 "就高不就低" 规则计算。
  # 本字段是 v0 第一个被 obligation trigger 直接消费的 derived 字段,
  # 它驱动 ob.disposal_site.geology_report / stability_monitoring / video_surveillance
  # 的触发状态。
  field.derived.disposal_site.level_assessment:
    canonical_name: 弃渣场级别评定 (GB 51018 表 5.7.1 计算结果)
    semantic_type: list_of_records
    record_schema:
      site_id: string
      site_name: string
      level: enum[1级, 2级, 3级, 4级, 5级]   # GB 51018 约定: 1=最严重, 5=无危害
      level_by_volume: enum[1级, 2级, 3级, 4级, 5级]
      level_by_height: enum[1级, 2级, 3级, 4级, 5级]
      level_by_harm: enum[1级, 2级, 3级, 4级, 5级]
      governing_dimension: enum[volume, height, harm]   # 最终 level 由哪一路决定
    protection_level: CRITICAL
    origin: derived
    source: cal.disposal_site.level_assessment
    note: |
      v0 约定: 1 级 = 最严重 (大体积/高堆/严重危害), 5 级 = 最轻。
      这与 GB 51018 表 5.7.1 一致, 也与 "就高不就低" 规则一致。

      Step 11C 之前 v0 ObligationSet 的 DSL 使用了**反转约定** (in [3级,4级,5级]),
      与本字段的 note 和 GB 51018 都矛盾。Step 11C 已将 3 条 obligation
      trigger DSL 修正为正确方向: in [1级, 2级, 3级] / in [1级, 2级]。

      计算逻辑 (cal.disposal_site.level_assessment):
        level_by_volume = lookup(表 5.7.1, volume)
        level_by_height = lookup(表 5.7.1, max_height)
        level_by_harm   = lookup(表 5.7.1, downstream_harm_class)
        level = min(level_by_volume, level_by_height, level_by_harm)
        governing_dimension = 产生最小 level 的那一路
    normative_basis_refs:
      - rule.gb_51018_2014.section_5_7_1
      - rule.gb_51018_2014.table_5_7_1_notes
    evidence_anchor_refs:
      - field.fact.disposal_site.level_assessment       # 上游: volume/max_height/harm
    authority_class: mandatory_standard
    precedence_rank: 3
    lineage:
      upstream_deps:
        - field.fact.disposal_site.level_assessment
      derivation: |
        对 fact.level_assessment 里的每个 site:
          level_by_volume = GB 51018 表 5.7.1 按 volume 查档
          level_by_height = GB 51018 表 5.7.1 按 max_height 查档
          level_by_harm   = GB 51018 表 5.7.1 按 downstream_harm_class 查档
          level = min(三者)  # "就高不就低" = 取级别更高 = 数字更小
      projection_target_refs:
        - sec.disposal_site.site_selection
        - art.table.spoil_summary
      invalidation_targets:
        - ob.disposal_site.geology_report
        - ob.disposal_site.stability_monitoring
        - ob.disposal_site.video_surveillance
    validation:
      rule: |
        level ∈ [1级, 2级, 3级, 4级, 5级]
        level == min(level_by_volume, level_by_height, level_by_harm)

# ============================================================
# REGISTRY VALIDATION HOOKS
# ============================================================
# 本 registry 自身的 lint 规则
registry_lints:
  - id: FIR_001
    rule: 每个 field 必须声明 protection_level
    scope: all fields
  - id: FIR_002
    rule: 每个 derived field 必须声明 upstream_deps 与 derivation
    scope: field.derived.*
  - id: FIR_003
    rule: projection_target_refs 必须全部通过 CORE_CONTRACTS_001 检测
    scope: all fields
  - id: FIR_004
    rule: source 字段指向 2026_template_table_1 的字段必须同时投影到 proj.spec_sheet.*
    scope: all fields
  - id: FIR_005
    rule: v0_allowed_values 一旦设置, 系统必须在接收数据时校验枚举值在白名单内
    scope: all enum fields with v0_allowed_values

# ============================================================
# 显式缺位声明 (v0 不做的字段, 受反升级条款保护)
# ============================================================
# 下列字段识别自 2026 模板, 但 v0 硬范围收敛不做
# 任何提前实施需 RFC + 更新决议文档
v0_excluded_fields:
  - path: field.fact.mining.*
    reason: v0 不支持矿山行业 (17-22)
  - path: field.fact.linear.longitudinal_profile
    reason: v0 不支持线性工程
  - path: field.fact.disposal_site.failure_simulation.*
    reason: 弃渣场失事影响专题 v0 作为单册附件上传, 不做字段化
  - path: field.fact.monitoring.video_stream_ref
    reason: 3 级以上弃渣场视频监控 v0 不做自动接入
  - path: field.fact.yellow_river.silt_dam
    reason: 惠州项目不在黄河流域
  - path: field.fact.classified.secrecy_level
    reason: 涉密项目 v0 不支持
