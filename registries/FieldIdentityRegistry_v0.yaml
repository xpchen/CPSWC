# FieldIdentityRegistry v0
#
# 功能: CPSWC 所有语义字段的权威注册表
# 约束: CPSWC_ARCHITECTURE_DECISIONS.md (决议 4) + CPSWC_CORE_CONTRACTS.yaml
#
# 命名规则:
#   - field.fact.*    = 基础事实 (专家/系统录入, 不派生)
#   - field.derived.* = 派生量 (由 derivation 计算, 只读)
#   - projection 目标用 proj.* / sec.* / narr.* / art.*
#
# 本文件是 v0 的最小可用集, 覆盖:
#   - 2026 模板附件 1 表 1 水土保持方案特性表的全部字段
#   - 2026 模板附件 3 报告表的关键字段 (交叉投影验证)
#   - 六项防治指标的派生链
#   - 惠州房地产样本必需的扩展事实字段
#
# 未列入 v0 的字段 (矿山/线性/水利专项) 受反升级条款约束, 需 RFC 批准后扩展

version: v0
generated_at: 2026-04-11
applicable_species: [报告书]
applicable_v0_industries: [29, 30]   # 29 房地产 + 30 其他城建
constraint_docs:
  - CPSWC_ARCHITECTURE_DECISIONS.md
  - CPSWC_CORE_CONTRACTS.yaml

# ============================================================
# 语义类型定义 (Semantic Types)
# ============================================================
# 所有 Quantity 类字段的值必须是 {value: number, unit: string} 结构
# 不允许裸数字入 field.value, 防止单位漂移
semantic_types:
  string:
    kind: scalar
  text:
    kind: scalar
    note: 多行文本
  number:
    kind: scalar
  percent:
    kind: scalar
    constraint: 0 <= value <= 100
    unit: "%"
  year:
    kind: scalar
    format: "YYYY"
  year_month:
    kind: scalar
    format: "YYYY-MM"
  enum:
    kind: scalar
    requires: enum_values
  bool:
    kind: scalar
  Quantity:
    kind: compound
    schema: { value: number, unit: string }
    requires: [unit, precision]
  Area:
    extends: Quantity
    unit_enum: ["hm²", "m²", "km²"]
  Volume:
    extends: Quantity
    unit_enum: ["m³", "万m³"]
  Mass:
    extends: Quantity
    unit_enum: ["t", "kg", "万t"]
  Currency:
    extends: Quantity
    unit_enum: ["万元", "元"]
  ErosionModulus:
    extends: Quantity
    unit: "t/(km²·a)"
  Coordinate:
    kind: compound
    schema: { x: number, y: number, crs: string }
    note: CRS 必须是 CGCS2000
  geo_ref:
    kind: reference
    target: GeoStore
    note: |
      指向 GeoStore 中的空间对象或文件对象, v0 最小实现为 shapefile / geometry 资源引用。
      实际载荷是一个 id + metadata 结构, 不是空间数据本身。
  record:
    kind: compound
    schema: dynamic
    note: 动态结构复合类型, 具体字段由使用方的 record_schema 声明
  list_of_records:
    kind: list
    element_type: record
    note: 列表元素为 record, 每条的 schema 由 record_schema 字段声明
  list_of_string:
    kind: list
    element_type: string

# ============================================================
# FACT DOMAIN - 基础事实字段
# ============================================================
fields:

