  # -------- 监管参数 (v0-live, Step 11A 首批) --------
  # field.fact.regulatory.* 不是项目事实, 而是"项目所在地的法定参数"。
  # v0 单一广东包下值固定; v1 由 Region Override Layer (决议 9) 注入地方特化。
  # 本字段是决议 8 下 Step 10 Region Override prototype 的 target_ref 兑现点,
  # 也是 cal.compensation.fee 的法定费率 evidence anchor。
  field.fact.regulatory.compensation_fee_rate:
    canonical_name: 水土保持补偿费征收费率
    semantic_type: Quantity    # 费率, 不是货币; 拍板 Q1: 不用 Currency
    unit: 元/m²
    precision: 0.01
    protection_level: CRITICAL  # 直接决定法定应缴金额 (拍板 Q1)
    origin: regulatory_parameter
    source: 粤发改价格〔2021〕231 号 / 粤水规范字〔2026〕1 号
    note: |
      广东省水土保持补偿费征收费率, 一般性生产建设项目 0.6 元/m², 一次性计征。
      适用范围: 广东省辖区内所有生产建设项目 (含房地产 29 / 其他城建 30 等)。
      计征范围: 永久占地 + 临时占地 (广东口径含临时), 以 m² 为单位。

      v0 单一广东包下, 本字段值固定为 0.6 元/m² (由 sample 提供)。
      v1 接入 Region Override Layer 后, 由 ro.field_rate.gd.compensation_fee
      的 replace_map_entry action 注入 region_specific_rate.广东省 = 0.6。

      历史风险: 2022 年前旧标准为约 0.06 元/m², 新旧差 10 倍。
      样本 annotations.compensation_fee 保留了这一历史对照,
      用作 validator 的十倍偏差保险丝。
    # 决议 8 双锚必备
    normative_basis_refs:
      - rule.guangdong.fa_gai_2021_231      # 粤发改价格〔2021〕231 号 (official_approval L4)
      - rule.guangdong.shui_gui_fan_zi_2026_1 # 粤水规范字〔2026〕1 号
      - rule.ministry_order_53              # 水利部令 53 号 (补偿费制度上位依据)
    evidence_anchor_refs:
      - field.fact.location.province_list  # 广东省归属决定适用本费率
    authority_class: official_approval
    precedence_rank: 4
    lineage:
      upstream_deps: []          # 规范性参数, 不依赖其他 field
      derivation: null
      projection_target_refs:
        - art.table.investment.compensation_fee
        - proj.spec_sheet.compensation_fee_standard  # 投资说明段落引用
      invalidation_targets:
        - field.derived.investment.compensation_fee_amount  # 费率变 → 金额重算
    validation:
      default: 0.6
      rule: |
        广东省单一包下固定 0.6; 跨省项目须按各省 region_specific_rate 分省取值
        (v1 功能, v0 禁用)

  # -------- 投资派生 (v0-live, Step 11A 首批) --------
  # 决议 8 下第一个完全合规的 live derived field:
  # upstream_deps / derivation / normative_basis_refs / evidence_anchor_refs
  # 从第一天就齐全, 作为后续 derived field 的模板样本。
  field.derived.investment.compensation_fee_amount:
    canonical_name: 水土保持补偿费应缴金额
    semantic_type: Currency      # 这个才是货币值 (派生结果)
    unit: 万元                    # 报告书习惯用 "万元"
    precision: 0.01
    protection_level: CRITICAL
    origin: derived
    source: cal.compensation.fee  # 指向 CalculatorRegistry 中的 calculator id
    note: |
      由 CalculatorRegistry_v0 中的 cal.compensation.fee 派生。
      公式: (permanent_area_m2 + temporary_area_m2) × rate / 10000 (元 → 万元)
      其中 permanent/temporary_area 从 hm² 转 m² 乘以 10000。

      惠州样本结果: (8.2 + 1.3) hm² = 9.5 hm² = 95,000 m²
                   95,000 × 0.6 = 57,000 元 = 5.7 万元
    # 决议 8 双锚必备 (模板样本)
    normative_basis_refs:
      - rule.guangdong.fa_gai_2021_231
      - rule.ministry_order_53
    evidence_anchor_refs:
      - field.fact.land.permanent_area
      - field.fact.land.temporary_area
      - field.fact.regulatory.compensation_fee_rate
    authority_class: official_approval
    precedence_rank: 4
    lineage:
      upstream_deps:
        - field.fact.land.permanent_area
        - field.fact.land.temporary_area
        - field.fact.regulatory.compensation_fee_rate
      derivation: |
        cal.compensation.fee:
          chargeable_area_m2 = (permanent_area_hm2 + temporary_area_hm2) × 10000
          amount_yuan = chargeable_area_m2 × rate_yuan_per_m2
          amount_wan = amount_yuan / 10000
      projection_target_refs:
        - art.table.investment.compensation_fee
        - sec.investment_estimation.compensation_fee
