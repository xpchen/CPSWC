# ============================================================
# 源: 办水保〔2018〕133 号 生产建设项目水土保持设施自主验收规程 (试行)
# 适用: 编制水土保持方案报告书的项目
# v0 现状: 不支持 (v0 不涉及验收流程)

  ob.verification.scheme_and_approval_complete:
    entity_kind: obligation
    phase: verification
    one_line_description: 验收前水土保持方案及其变更编报审批程序完备 (7 项合格条件 a)
    planned_source_rule: rule.t2018.133_2_4_a
    reserved_since: 2026-04-11
    references_v0_obligations: [] # v0 审批流程不在 CPSWC 范围
    notes: 133 号第 2.4 条 a 项; 不合格对应第 4.8 条 a 项 (验收不通过)

  ob.verification.monitoring_data_complete:
    entity_kind: obligation
    phase: verification
    one_line_description: 水土保持监测资料齐全成果可靠 (7 项合格条件 b)
    planned_source_rule: rule.t2018.133_2_4_b
    reserved_since: 2026-04-11
    references_v0_obligations:
      - ob.monitoring.baseline_monitoring
      - ob.monitoring.point_layout
    notes: 133 号第 2.4 条 b; 不合格对应第 4.8 条 b/h

  ob.verification.supervision_data_complete:
    entity_kind: obligation
    phase: verification
    one_line_description: 水土保持监理资料齐全成果可靠 (7 项合格条件 c)
    planned_source_rule: rule.t2018.133_2_4_c
    reserved_since: 2026-04-11
    notes: 133 号第 2.4 条 c; 不合格对应第 4.8 条 c

  ob.verification.facilities_built_to_spec:
    entity_kind: obligation
    phase: verification
    one_line_description: 水土保持设施按经批准方案及设计建成, 符合国家/地方/行业标准 (7 项合格条件 d)
    planned_source_rule: rule.t2018.133_2_4_d
    reserved_since: 2026-04-11
    notes: 133 号第 2.4 条 d; 不合格对应第 4.8 条 e

  ob.verification.erosion_targets_achieved:
    entity_kind: obligation
    phase: verification
