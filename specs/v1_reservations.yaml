    planned_source_rule: rule.t2018.133_2_4_e
    reserved_since: 2026-04-11
    references_v0_obligations:
      - ob.evaluation.weighted_target_required
    notes: |
      133 号第 2.4 条 e; 六率达标通过 GB/T 50434 查表验证
      依赖 memory: reference_target_index_table.md

  ob.verification.no_major_hazard_residuals:
    entity_kind: obligation
    phase: verification
    one_line_description: 重要防护对象不存在严重水土流失危害隐患 (7 项合格条件 f)
    planned_source_rule: rule.t2018.133_2_4_f
    reserved_since: 2026-04-11
    references_v0_obligations:
      - ob.disposal_site.stability_monitoring
      - ob.disposal_site.failure_analysis
    notes: |
      133 号第 2.4 条 f + 第 5.1 条定义
      "重要防护对象" = 4 级 (含) 以上弃渣场等易发生水土流失危害及隐患的工程部位
      不合格对应第 4.8 条 f (无安全稳定结论或结论为不稳定)

  ob.verification.facilities_operational:
    entity_kind: obligation
    phase: verification
    one_line_description: 水土保持设施具备正常运行条件且运维责任已落实 (7 项合格条件 g)
    planned_source_rule: rule.t2018.133_2_4_g
    reserved_since: 2026-04-11
    notes: 133 号第 2.4 条 g

  ob.verification.third_party_evaluation:
    entity_kind: obligation
    phase: verification
    one_line_description: 由第三方技术服务机构编制水土保持设施验收报告
    planned_source_rule: rule.t2018.133_3_1
    reserved_since: 2026-04-11
    notes: |
      第三方必须具备独立承担民事责任能力 + 相应水土保持技术条件
      评价内容 4 大类:
        1. 项目法人水保法定义务履行情况
        2. 水土流失防治任务完成情况
        3. 水土流失防治效果情况
        4. 水土保持工作组织管理情况

  ob.verification.completion_meeting:
    entity_kind: obligation
    phase: verification
    one_line_description: 由项目法人组织竣工验收会议, 验收结论须 2/3 以上验收组成员同意
    planned_source_rule: rule.t2018.133_4
    reserved_since: 2026-04-11
    notes: |
      133 号第 4 章; 验收组由项目法人 + 水保设施验收报告编制/监测/监理/方案编制/施工单位代表组成
      项目法人可根据规模/性质/复杂度邀请水保专家参加

  ob.verification.9_rejection_criteria:
    entity_kind: obligation
    phase: verification
    one_line_description: 9 种不通过情形任一成立即判定验收不通过 (硬 gate)
    planned_source_rule: rule.t2018.133_4_8
    reserved_since: 2026-04-11
    notes: |
      133 号第 4.8 条 9 种情形:
      a) 未依法依规履行方案及重大变更的编报审批程序
      b) 未依法依规开展监测或补充开展不符合规定
      c) 未依法依规开展监理工作
      d) 废弃土石渣未堆放在批准的专门存放地
      e) 措施体系/等级/标准未按批准方案落实
      f) 重要防护对象无安全稳定结论或结论为不稳定
      g) 水保分部工程和单位工程未经验收或验收不合格
      h) 监测/监理总结报告弄虚作假或存在重大技术问题
      i) 未依法依规缴纳水土保持补偿费

