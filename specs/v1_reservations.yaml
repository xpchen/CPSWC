# ============================================================
# 批次 2 (2026-04-11, v1 前置宪法修补包)
# Schema 槽位预留 - 非 entity, 不构成 obligation/assurance/artifact
# 这些槽位定义 v1 将要在既有 schema 上新增的 optional 字段,
# 均遵循决议"Schema 扩展的默认值规则": 默认值保持 v0 行为不变。
# ============================================================

schema_reservations:

  - id: res.schema.field.source_authority
    entity_kind: schema_slot
    target_schema: FieldIdentityRegistry.field
    new_field_name: source_authority
    field_type: enum
    enum_values:
      - self_declared          # 建设单位自报 (v0 默认)
      - design_institute_calc  # 设计院重算
      - third_party_surveyed   # 第三方实测
      - remote_sensing         # 遥感核验
      - expert_recalculated    # 专家复核结论
      - regulatory_filed       # 已向主管部门备案
    default_value: self_declared
    arbitration_priority_draft: |
      regulatory_filed > expert_recalculated > third_party_surveyed
      > remote_sensing > design_institute_calc > self_declared
    reserved_since: 2026-04-11
    reason: |
      事实层的权属仲裁问题。v0 假设每个 field 有单一权威值, v1 必须
      面对"同一 field 多来源 + 优先级 + 仲裁"的场景。预留此槽位允许
      v1 在不迁移数据的前提下启用仲裁规则。
    notes: |
      v0 阶段本字段不校验取值, 默认 self_declared;
      v1 启用后 lint 新增规则校验 source_authority ∈ enum_values。

  - id: res.schema.obligation.region_override
    entity_kind: schema_slot
    target_schema: ObligationSet.obligation
    new_field_name: region_override
    field_type: map
    schema_draft: |
      region_override:
        <region_code>:         # 如 "guangdong", "jiangsu"
          requirement_type: <override>
          source_rule_ref: <地方规章>
          effective_since: <ISO 日期>
          notes: <地方口径说明>
    default_value: {}  # 空 map, 等同于无 override
    reserved_since: 2026-04-11
    reason: |
      地方灰区口径问题。广东有专门的承诺制与自主验收口径,
      其他省有不同的补偿费标准/项目分类。v1 扩展到第二个省份时
      若没有 override 层, 要么污染 v0 ObligationSet, 要么全量复制。
      预留此槽位让地方口径成为一等公民。
    notes: v0 不启用, 默认空 map; v1 启用时 region_code 使用国标行政区代码。

  - id: res.schema.field.region_specific_rate
    entity_kind: schema_slot
    target_schema: FieldIdentityRegistry.field
    new_field_name: region_specific_rate
    field_type: map
    schema_draft: |
      region_specific_rate:
        <region_code>: <numeric_value_with_unit>
    default_value: {}
    reserved_since: 2026-04-11
    override_capable: true  # 决议 9: 允许 Region Override 通过 target_attribute_path 命中
    override_slot_pattern: region_specific_rate.*  # 允许通配命中任意省级 key
    consumed_by_prototype:
      - RegionOverridePrototype_v1_reserved.yaml::ro.field_rate.gd.compensation_fee
    reason: |
      与 region_override 对偶, 但作用在 field 层。典型用例:
      补偿费费率 (粤 0.6 元/m², 其他省不同), 监测频次地方标准,
      目标值地方调整系数。v0 只能写死默认值, v1 通过此槽位支持
      按项目归属地自动取值。
    notes: |
      与 source_authority 正交: 前者说明"这个数从哪来",
      后者说明"这个数在不同地区应该是多少"。两者可共存。
      Step 10 补: 本槽位是 Region Override Layer 的首个
      override-capable slot, 对应决议 9 的 override_capable_slots 登记表。

  - id: res.schema.field.visibility_scope
    entity_kind: schema_slot
    target_schema: FieldIdentityRegistry.field # 以及 ObligationSet.obligation
    new_field_name: visibility_scope
    field_type: list[enum]
    enum_values:
      - public                  # 所有用户可见
      - design_institute        # 仅设计院内部
      - internal_review         # 仅内部审查
      - regulatory_only         # 仅向主管部门展示
    default_value: [public]
    reserved_since: 2026-04-11
    reason: |
      数据层角色隔离。penalty_warning_table_v1_reserved 中的罚款预估
      / 执法裁量信息若出现在面向建设单位的前台, 会立刻构成商业风险。
      此槽位作用于 field 和 obligation 层, 控制"谁能看到这条数据存在"。
    notes: |
      与 audience_scope 正交: 本槽位是数据可见性 (谁能看到),
      audience_scope 是输出受众 (谁是报告读者)。两层配合才是完整的
      角色隔离。

  - id: res.schema.artifact.audience_scope
    entity_kind: schema_slot
    target_schema: ArtifactRegistry.artifact
    new_field_name: audience_scope
    field_type: list[enum]
    enum_values:
      - construction_unit       # 建设单位 (正式报告书)
      - design_institute        # 设计院内部
      - internal_review         # 咨询机构内部审查
      - regulatory_authority    # 主管部门
    default_value: [construction_unit, regulatory_authority]
    reserved_since: 2026-04-11
    reason: |
      输出层角色隔离。同一套数据在不同受众面前应呈现为不同工件。
      典型: penalty_warning_table 必须限定在 [design_institute, internal_review],
      禁止出现在 [construction_unit] 的 Artifact 中。
    notes: |
      v1 启用后新增 lint 规则: 若 Artifact 引用的 field/obligation 的
      visibility_scope 与本 Artifact 的 audience_scope 不相容, 直接 ERROR。

  - id: res.schema.common.contribution_lineage
    entity_kind: schema_slot
    target_schema: "FieldIdentityRegistry.field | ObligationSet.obligation | governance_block"
    new_field_name: "contributed_by / reviewed_by"
    field_type: record
    schema_draft: |
      contributed_by:
        name: string
        role: string
        contributed_at: <ISO 日期>
      reviewed_by:
        - name: string
          role: string
          reviewed_at: <ISO 日期>
          verdict: enum[approved, rejected, pending]
    default_value: null
    reserved_since: 2026-04-11
    reason: |
      组织能力沉淀的声誉锚点。让规则 / 字段 / 开关都能被"署名"是
      推动老师傅把经验放进系统的关键激励。架构上为 v3 阶段的
      "贡献可见性"预留接口。决议 6 的 governance_block 已经在
      authored_by/authored_at 字段上先行落地了这个机制。
    notes: |
      v0 不强制; v1 启用时可选填; v2 起新增规则可选要求
      CRITICAL 字段必须有 contributed_by。

# ============================================================
# 批次 3 (2026-04-11, Step 10 Region Override 结构原型引用)
# 本节不重复 prototype 的内容, 只记录 prototype 文件的存在与
# 它消费的 schema 槽位关系, 以及 v1 runtime 的预期选择顺序。
# ============================================================

region_override_prototype_reference:

  prototype_file: RegionOverridePrototype_v1_reserved.yaml
  prototype_version: region_override_prototype_v0.1

  region_override_object_kinds:
    # 决议 9 第 action 闭集的 target_kind 分类
    - field_rate               # 对 field 的 region_specific_rate 槽位做替换
    - obligation_applicability # 对 obligation.applicability 做收窄
    - artifact_addition        # 给 obligation 追加 required_artifact_refs
    - assurance_addition       # 给 obligation 追加 required_assurance_refs

  planned_runtime_resolution_order:
    # v1 runtime 选择链的预期顺序 (仅文字描述, 不是执行代码)
    step_1: |
      从 SubmissionContext 提取 project.location.province / prefecture / county,
      构造 region_scope_key
    step_2: |
      用 region_scope_key 查询 RegionOverrideRegistry_v1 (本 prototype 的 v1 版),
      得到候选 override set
    step_3: |
      按决议 9 第 5 条冲突消解顺序排序: precedence_rank -> effective_since ->
      issued_by_scope -> manual_arbitration
    step_4: |
      对每个胜出的 override 检查 mandatory_floor 规则: 是否削弱了 mandatory_standard
      或更高 authority_class 的约束, 若是则拒绝
    step_5: |
      合法 override 按 action 类型注入 runtime (replace_scalar / replace_map_entry /
      add_constraint / add_required_artifacts / refine_applicability)
    step_6: |
      对每一次 override 注入记录 audit trail (authority_chain_audit),
      供 ModificationReport 引用

  reserved_files_referenced:
    - RegionOverridePrototype_v1_reserved.yaml
    - penalty_warning_table_v1_reserved.yaml  # 未来 violation override 入口
    - v1_reservations.yaml                     # 本文件自身

  lint_skeleton_reserved:
    # 决议 9 预埋的 reserved-only lint 规则名
    - REGION_OVERRIDE_001  # target_ref resolve
    - REGION_OVERRIDE_002  # provenance + override_capable 槽位校验
    - REGION_OVERRIDE_003  # 冲突消解键合法性 + refine_applicability 不放宽 + province!="*"

