# CPSWC v1 Reservations
#
# 本文件是 "前向兼容预埋豁免条款" (CPSWC_ARCHITECTURE_DECISIONS.md) 下的预埋文件。
#
# 规则要点 (完整见决议文档):
#   1. 本文件里的条目是 v1+ 的预留 id, 不是 v0 生效规则
#   2. cross_registry_lint.py 不加载本文件进 v0 lint
#   3. 本文件可以引用 v0 id (通过 references_v0_fields 字段),
#      但 v0 的任何文件不得反向引用本文件里的任何 id
#   4. v0 registry (ObligationSet_v0.yaml / AssuranceRegistry_v0.yaml /
#      CPSWC_ARTIFACT_REGISTRY_v0.yaml / FieldIdentityRegistry_v0.yaml)
#      不得以任何形式 (包括注释或 disabled 标记) 包含本文件里的条目
#   5. 提升到 v1 正式 registry 必须走 RFC 流程
#
# 条目结构:
#   id:                          命名空间合法 (ob./as./art.)
#   entity_kind:                 obligation | assurance | artifact
#   phase:                       application | construction | verification | post_verification
#   one_line_description:        简述用途
#   planned_source_rule:         规则依据 (rule.* id 或法规原文位置)
#   reserved_since:              预埋日期
#   references_v0_fields:        预埋条目将来会依赖的 v0 field id (允许)
#   references_v0_obligations:   预埋条目将来会依赖的 v0 obligation id (允许)
#   notes:                       其他备注 (可选)

version: v1_reserved_v0.1
generated_at: 2026-04-11
governance_doc: CPSWC_ARCHITECTURE_DECISIONS.md # 前向兼容预埋豁免条款
v0_lint_status: excluded # 本文件不进 v0 lint, 由 --include-reserved 开关主动检查 (未实现)

# ============================================================
# Phase: application (申报阶段 — 承诺制 / 公示 / 提交)
# ============================================================
# 源: 办水保〔2020〕160 号 生产建设项目水土保持承诺制管理通知
# 适用: 编制水土保持方案报告表的项目; 水土保持区域评估范围内的项目
# v0 现状: 不支持 (v0 仅报告书, 未启用承诺制流程)

reservations:
  ob.commitment.application_promise:
    entity_kind: obligation
    phase: application
    one_line_description: 承诺制项目建设单位对承诺书 6 条内容作出书面承诺
    planned_source_rule: rule.t2020.160_application_commitment_6items
    reserved_since: 2026-04-11
    references_v0_fields:
      - field.fact.party.construction_unit
    notes: |
      承诺内容 6 条 (160 号第二条):
      1. 知晓并履行水保法定义务
      2. 信息真实完整准确, 方案符合标准
      3. 严格执行"三同时"制度, 投产前完成设施自主验收并报备
      4. 按时足额缴纳补偿费
      5. 配合监督检查
      6. 承担不实或未履行的法律责任和失信责任

  ob.disclosure.public_10_workdays:
    entity_kind: obligation
    phase: application
    one_line_description: 承诺制项目方案报批前须公开拟报批方案全文 ≥10 个工作日
    planned_source_rule: rule.t2020.160_pre_submission_disclosure
    reserved_since: 2026-04-11
    references_v0_fields:
      - field.fact.project.name
      - field.fact.party.construction_unit
    notes: |
      公开渠道: 建设单位网站 / 项目所在地公共媒体网站 / 相关政府网站
      期限: 不得少于 10 个工作日
      公众意见必须逐一处理与回应, 并在承诺书中说明

  ob.submission.form_review_only:
    entity_kind: obligation
    phase: application
    one_line_description: 承诺制项目的审批仅进行形式审查, 即来即办, 现场办结
    planned_source_rule: rule.t2020.160_form_review
    reserved_since: 2026-04-11
    notes: |
      材料齐全/格式符合 → 受理后即来即办
      出具准予许可决定, 明确补偿费征收金额
      材料不齐 → 当场一次性告知补正材料

# ============================================================
# Phase: construction (建设阶段 — 现场持续履约)
# ============================================================

  ob.construction.on_site_commitment_public:
    entity_kind: obligation
    phase: construction
    one_line_description: 建设期间在项目现场建设管理场所公开水土保持行政许可承诺书
    planned_source_rule: rule.t2020.160_construction_disclosure
    reserved_since: 2026-04-11
    notes: 持续性义务, 贯穿整个建设期; v1 需要设计周期性 gate (例如月度/季度检查)

  ob.construction.commitment_compliance_ongoing:
    entity_kind: obligation
    phase: construction
    one_line_description: 建设期间严格落实承诺书中的各项水土流失防治措施
    planned_source_rule: rule.t2020.160_commitment_compliance
    reserved_since: 2026-04-11
    notes: 对应"三同时"制度的建设期部分

# ============================================================
